apply plugin: 'com.android.application'

android {
    compileSdkVersion 34
    namespace 'com.antigravity.sentientaibrowser'
    defaultConfig {
        applicationId "com.antigravity.sentientaibrowser"
        minSdkVersion 21
        targetSdkVersion 34
        versionCode 1
        versionName "1.0"
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

dependencies {
    implementation 'com.facebook.react:react-native:+'  // From node_modules
}
