// Copilot test patch: verifying patching works
apply plugin: 'com.android.application'
repositories {
    mavenCentral()
    google()
    jcenter()
    maven {
        url "$rootDir/../node_modules/react-native/android"
    }
}

android {
    compileSdkVersion 34
    namespace 'com.demonstratorz.sentientaibrowser'
    defaultConfig {
        applicationId "com.demonstratorz.sentientaibrowser"
        minSdkVersion 21
        targetSdkVersion 34
        versionCode 1
        versionName "1.0"
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

dependencies {
    implementation 'com.facebook.react:react-native:0.84.1'
}
