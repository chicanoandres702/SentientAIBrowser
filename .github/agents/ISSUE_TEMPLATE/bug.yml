name: "🐛 Bug Report (AIDDE Medic)"
description: "Report a bug for RCA and recursive debugging"
title: "[BUG] "
labels: ["bug", "medic"]
assignees: []
body:
  - type: input
    id: milestone
    attributes:
      label: "Parent Feature (Milestone)"
      placeholder: "e.g. User Authentication"
    validations:
      required: true

  - type: textarea
    id: purpose
    attributes:
      label: "🎯 Purpose"
      description: "Why does fixing this matter to the broader feature?"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "📝 Description"
      description: "What is broken? Expected vs actual behavior."
    validations:
      required: true

  - type: textarea
    id: the-issue
    attributes:
      label: "🐛 The Issue"
      description: "Error logs, stack traces, broken logic. Paste in full."
    validations:
      required: true

  - type: textarea
    id: rca
    attributes:
      label: "🔍 Root Cause Analysis (3x Why)"
      description: "Run the Diagnostic Medic protocol before submitting."
      value: |
        * **Why 1:** [Immediate symptom]
        * **Why 2:** [Underlying mechanism]
        * **Why 3:** [Root design flaw]
        * **Root Cause:** [Definitive statement]

  - type: textarea
    id: system-flow
    attributes:
      label: "🔄 System Flow (Traceability)"
      value: |
        * **Upstream:** [Where is the broken input coming from?]
        * **Downstream:** [What is this failure cascading into?]
    validations:
      required: true

  - type: textarea
    id: subtasks
    attributes:
      label: "☑️ Subtasks (Fix Checklist)"
      value: |
        - [ ] Reproduce the bug
        - [ ] Apply fix
        - [ ] Verify all 8 CI/CD gates pass
    validations:
      required: true
