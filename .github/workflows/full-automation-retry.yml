name: Full Automation Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - feature-proxy
  pull_request:
    branches:
      - main
      - feature-proxy

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'
      - name: Download Android Default Icons
        run: |
          mkdir -p app/src/main/res/mipmap-mdpi/
          mkdir -p app/src/main/res/mipmap-hdpi/
          mkdir -p app/src/main/res/mipmap-xhdpi/
          mkdir -p app/src/main/res/mipmap-xxhdpi/
          mkdir -p app/src/main/res/mipmap-xxxhdpi/
          cp .github/icons/mipmap-mdpi/ic_launcher.png app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp .github/icons/mipmap-hdpi/ic_launcher.png app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp .github/icons/mipmap-xhdpi/ic_launcher.png app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp .github/icons/mipmap-xxhdpi/ic_launcher.png app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp .github/icons/mipmap-xxxhdpi/ic_launcher.png app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

      - name: Copy adaptive icon XML files
        run: |
          mkdir -p app/src/main/res/mipmap-anydpi-v26/
          cp .github/icons/mipmap-anydpi-v26/ic_launcher.xml app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          cp .github/icons/mipmap-anydpi-v26/ic_launcher_foreground.xml app/src/main/res/mipmap-anydpi-v26/ic_launcher_foreground.xml
          cp .github/icons/mipmap-anydpi-v26/ic_launcher_background.xml app/src/main/res/mipmap-anydpi-v26/ic_launcher_background.xml

      - name: Copy icon drawables (optional)
        run: |
          mkdir -p app/src/main/res/drawable/
          cp .github/icons/drawable/ic_launcher_foreground.png app/src/main/res/drawable/ic_launcher_foreground.png
          cp .github/icons/drawable/ic_launcher_background.png app/src/main/res/drawable/ic_launcher_background.png
      - name: Print Node.js version
        run: |
          node --version
          which node
          echo $PATH
      - name: Download Android SDK Platform-Tools
        run: |
          wget https://dl.google.com/android/repository/platform-tools-latest-linux.zip -O platform-tools.zip
          unzip platform-tools.zip -d $HOME
          echo "$HOME/platform-tools" >> $GITHUB_PATH
      - name: Download Gradle 8.7
        run: |
          wget https://services.gradle.org/distributions/gradle-8.7-bin.zip -O android/gradle-8.7-bin.zip
      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: android/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/*.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: Install Node.js dependencies
        run: |
          npm install
        working-directory: .
      - name: Debug Node in Android dir
        run: |
          cd android
          node --version
          which node
          echo $PATH
      - name: Print React Native version and config
        run: |
          npx react-native --version
          npx react-native config
      # The erroneous AAR build step has been removed!
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          export PATH=$PATH:$(dirname $(which node))
          ./gradlew assembleRelease
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
