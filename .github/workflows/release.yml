name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create GitHub Release
        run: |
          gh release create ${{ github.ref_name }} \
            --generate-notes \
            --target main \
            --title "Release ${{ github.ref_name }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: create-release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            asset: aidde-windows-amd64.exe
          - goos: darwin
            goarch: amd64
            asset: aidde-darwin-amd64
          - goos: darwin
            goarch: arm64
            asset: aidde-darwin-arm64
          - goos: linux
            goarch: amd64
            asset: aidde-linux-amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: go build -ldflags="-s -w" -o ${{ matrix.asset }} ./cmd/aidde
      - name: Upload binary
        run: gh release upload ${{ github.ref_name }} ${{ matrix.asset }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
