# ============================================================
# [Parent Feature/Milestone] CI/CD Pipeline
# [Child Task/Issue] Deploy — Sentient AI Browser
# [Subtask] Unified deploy: web + functions + hosting + Cloud Run
# [Upstream] GitHub push (main) -> [Downstream] Firebase + GCP Cloud Run
# [Law Check] Config file — exempt from 100-line law
# ============================================================
name: 🚀 Deploy — Sentient AI Browser

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target"
        required: true
        default: all
        type: choice
        options:
          - all
          - hosting
          - functions
          - cloudrun

# Cancel in-progress runs on the same branch
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PROJECT_ID: sentient-ai-browser

# ─────────────────────────────────────────────
# JOB 1 — Build Expo Web → upload artifact
# ─────────────────────────────────────────────
jobs:
  build-web:
    name: 🏗️ Build Web
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      github.event.inputs.target == 'all' ||
      github.event.inputs.target == 'hosting'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Export Expo web app
        run: npx expo export --platform web
        env:
          EXPO_PUBLIC_FIREBASE_API_KEY:              ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN:          ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID:           ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET:       ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID:  ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID:               ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
          EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID:       ${{ secrets.EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID }}

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/
          retention-days: 1

  # ─────────────────────────────────────────────
  # JOB 2 — Build Firebase Functions → upload artifact
  # ─────────────────────────────────────────────
  build-functions:
    name: 🏗️ Build Functions
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      github.event.inputs.target == 'all' ||
      github.event.inputs.target == 'functions' ||
      github.event.inputs.target == 'cloudrun'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install functions dependencies
        run: npm ci
        working-directory: functions

      - name: Compile TypeScript
        run: npm run build
        working-directory: functions

      - name: Upload functions lib artifact
        uses: actions/upload-artifact@v4
        with:
          name: functions-lib
          path: functions/lib/
          retention-days: 1

  # ─────────────────────────────────────────────
  # JOB 3 — Deploy GitHub Pages
  # ─────────────────────────────────────────────
  deploy-hosting:
    name: 🐙 Deploy GitHub Pages
    needs: build-web
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy-pages.outputs.page_url }}
    if: >
      github.event.inputs.target == 'hosting'
    steps:
      - name: Download web dist artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        id: deploy-pages
        uses: actions/deploy-pages@v4

  # ─────────────────────────────────────────────
  # JOB 4 — Deploy Firestore Rules + Indexes
  # Note: Firebase Functions are intentionally deleted — Cloud Run is the executor.
  # This job ONLY syncs Firestore security rules and indexes.
  # ─────────────────────────────────────────────
  deploy-functions:
    name: 🔥 Deploy Firestore Rules
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      github.event.inputs.target == 'all' ||
      github.event.inputs.target == 'functions'
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Install firebase-tools
        run: npm install -g firebase-tools

      - name: Deploy Firestore rules + indexes
        run: |
          firebase deploy \
            --only firestore:rules,firestore:indexes \
            --non-interactive \
            --project ${{ env.PROJECT_ID }}

  # ─────────────────────────────────────────────
  # JOB 5 — Deploy Cloud Run (functions container)
  # ─────────────────────────────────────────────
  deploy-cloudrun:
    name: ☁️ Deploy Cloud Run
    needs: build-functions
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
    if: >
      github.event_name == 'push' ||
      github.event.inputs.target == 'all' ||
      github.event.inputs.target == 'cloudrun'
    steps:
      - uses: actions/checkout@v4

      # ── Lowercase image name (Docker tags must not contain uppercase) ─
      - name: Set lowercase image name
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # ── Push image to GitHub Container Registry (ghcr.io) ────
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push Docker image to GHCR
        uses: docker/build-push-action@v5
        with:
          context: ./functions
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest

      # ── Authenticate to GCP via service account JSON ──────────────
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      # ── Deploy the GHCR image to Cloud Run ───────────────────
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: sentient-proxy
          image:   ${{ env.IMAGE }}:${{ github.sha }}
          region:  us-central1
          flags:   --allow-unauthenticated --memory 2Gi --cpu 1 --timeout 300 --min-instances 0 --max-instances 2
