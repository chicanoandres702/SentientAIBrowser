# Android APK Build — GitHub Actions
# Builds a debug APK on push to main/android/* branches and on version tags.
# Attaches the APK to a GitHub Release when a tag is pushed.
# Download + sideload locally: .\deploy-android.ps1 -Target gh-adb

name: 🤖 Android Build

on:
  push:
    branches: [main, android, 'android/*']
    tags:     ['v*']
  workflow_dispatch:
    inputs:
      release:
        description: 'Create a GitHub Release with the APK'
        type: boolean
        default: false

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    name: 🏗️ Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Expo prebuild
        run: npx expo prebuild --platform android --non-interactive
        env:
          EXPO_PUBLIC_FIREBASE_API_KEY:    ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}

      - name: Disable New Architecture (CMake path fix)
        run: sed -i 's/newArchEnabled=true/newArchEnabled=false/' android/gradle.properties

      - name: Bundle JS into APK (disable Metro-load mode)
        # Why: default debuggableVariants=["debug"] skips JS bundling and loads from Metro at runtime.
        # Empty list forces Gradle to bundle JS into every variant — APK works standalone.
        run: |
          sed -i 's|// debuggableVariants = \["liteDebug", "prodDebug"\]|    debuggableVariants = []|' android/app/build.gradle
          grep 'debuggableVariants' android/app/build.gradle || echo 'WARNING: debuggableVariants pattern not found'

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        env:
          NODE_ENV: production
          EXPO_PUBLIC_FIREBASE_API_KEY:            ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID:         ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_GEMINI_API_KEY:              ${{ secrets.EXPO_PUBLIC_GEMINI_API_KEY }}
          EXPO_PUBLIC_GITHUB_PERSONAL_ACCESS_TOKEN: ${{ secrets.EXPO_PUBLIC_GITHUB_PERSONAL_ACCESS_TOKEN }}
          GOOGLE_API_KEY:                          ${{ secrets.GOOGLE_API_KEY }}
        run: ./gradlew assembleDebug --no-daemon

      - name: Locate APK
        id: apk
        run: |
          APK=$(find android/app/build/outputs/apk/debug -name '*.apk' | head -1)
          echo "path=$APK" >> $GITHUB_OUTPUT
          echo "name=sentient-ai-browser-debug.apk" >> $GITHUB_OUTPUT

      - name: Upload APK artifact (7-day retention)
        uses: actions/upload-artifact@v4
        with:
          name: sentient-ai-browser-apk
          path: ${{ steps.apk.outputs.path }}
          retention-days: 7

      - name: Create GitHub Release with APK
        if: startsWith(github.ref, 'refs/tags/v') || inputs.release == true
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.path }}
          name:  Sentient AI Browser ${{ github.ref_name }}
          draft: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
