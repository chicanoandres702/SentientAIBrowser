# GitHub Actions workflow for Playwright + Proxy container
# Why: Build and push container to GitHub Container Registry (GHCR)

name: Build and Push Playwright Proxy Container

on:
  push:
    paths:
      - Dockerfile.playwright-proxy
      - scripts/proxy.worker.js
      - package.json
      - yarn.lock
      - src/**
      - shared/**
      - .github/workflows/playwright-proxy.yml
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build container image
        run: |
          docker build -f Dockerfile.playwright-proxy -t ghcr.io/${{ github.repository }}/playwright-proxy:latest .
      - name: Push image to GHCR
        run: |
          docker push ghcr.io/${{ github.repository }}/playwright-proxy:latest
