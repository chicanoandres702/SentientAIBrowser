name: Full Automation Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - feature-proxy
  pull_request:
    branches:
      - main
      - feature-proxy

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'
      - name: Print Node.js version
        run: |
          node --version
          which node
          echo $PATH
      - name: Download Android SDK Platform-Tools
        run: |
          wget https://dl.google.com/android/repository/platform-tools-latest-linux.zip -O platform-tools.zip
          unzip platform-tools.zip -d $HOME
          echo "$HOME/platform-tools" >> $GITHUB_PATH
      - name: Download Gradle 8.7
        run: |
          wget https://services.gradle.org/distributions/gradle-8.7-bin.zip -O android/gradle-8.7-bin.zip
      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: android/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/*.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: Install Node.js dependencies
        run: npm install --force
        working-directory: .
      - name: Copy gradlew to ReactAndroid
        run: cp android/gradlew node_modules/react-native/ReactAndroid/gradlew
        working-directory: .
      - name: Build and Copy React Native AAR
        run: |
          cd node_modules/react-native/ReactAndroid
          ./gradlew :ReactAndroid:installArchives
          cd ../../..
          mkdir -p android/local-maven/com/facebook/react/react-native/0.84.1/
          cp node_modules/react-native/ReactAndroid/build/outputs/aar/react-native-release.aar android/local-maven/com/facebook/react/react-native/0.84.1/react-native-0.84.1.aar
          cp node_modules/react-native/ReactAndroid/build/outputs/aar/react-native-release.pom android/local-maven/com/facebook/react/react-native/0.84.1/react-native-0.84.1.pom
        working-directory: .
      - name: Debug Node in Android dir
        run: |
          cd android
          node --version
          which node
          echo $PATH
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          export PATH=$PATH:$(dirname $(which node))
          ./gradlew assembleRelease --stacktrace
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
