name: Full Automation Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - feature-proxy
  pull_request:
    branches:
      - main
      - feature-proxy
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download Android SDK Platform-Tools
        run: |
          wget https://dl.google.com/android/repository/platform-tools-latest-linux.zip -O platform-tools.zip
          unzip platform-tools.zip -d $HOME
          echo "$HOME/platform-tools" >> $GITHUB_PATH

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: android/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/*.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
          - name: Build APK
            run: |
              chmod +x gradlew
              ./gradlew assembleRelease
            working-directory: android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
