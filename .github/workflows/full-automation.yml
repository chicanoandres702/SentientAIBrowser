# AIDDE Trace: Full Automation Pipeline
# Why: Consolidates build logic and fixes syntax/merge conflicts in the workflow.

name: Full Automation Pipeline

on:
  workflow_dispatch:
  push:
    branches: [main, feature-proxy]
  pull_request:
    branches: [main, feature-proxy]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Download Android SDK Platform-Tools
        run: |
          wget https://dl.google.com/android/repository/platform-tools-latest-linux.zip -O platform-tools.zip
          unzip platform-tools.zip -d $HOME
          echo "$HOME/platform-tools" >> $GITHUB_PATH

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: android/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/*.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: Install Node.js dependencies
        run: npm install
        working-directory: .

      - name: Build React Native Android AAR
        run: |
          cd node_modules/react-native
          npm run build:android || true
        working-directory: .
      - name: Build APK
        run: |
          chmod +x gradlew
          # Ensure node is in path for react-native gradle tasks
          export PATH=$PATH:$(dirname $(which node))
          ./gradlew assembleRelease
        working-directory: android
        env:
          NODE_ENV: production

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7
