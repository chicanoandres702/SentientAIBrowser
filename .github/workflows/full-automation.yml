name: Full Automation Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main  # Change to your default branch if different
      - feature-proxy

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download Android SDK Platform-Tools
        run: |
          wget https://dl.google.com/android/repository/platform-tools-latest-linux.zip -O platform-tools.zip
          unzip platform-tools.zip -d $HOME
          echo "$HOME/platform-tools" >> $GITHUB_PATH

      - name: Build APK
        run: ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v3
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/app-release.apk
