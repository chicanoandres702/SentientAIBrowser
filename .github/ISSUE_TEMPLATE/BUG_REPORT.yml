name: Bug Report
description: File a report to help us improve Sentient AI Browser
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: bug-description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How did you encounter this bug?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: What version of the app are you using?
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Please paste any relevant terminal or console logs.
